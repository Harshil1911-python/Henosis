services:
  - type: web
    name: henosis
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
    disk:
      name: henosis-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
